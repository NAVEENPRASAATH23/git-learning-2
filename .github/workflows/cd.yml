name: Docker Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Copying source code
        uses: actions/checkout@v4 

      - name: Login Docker Hub
        run: echo "${{secrets.DOCKER_PASS}}" | docker login -u "${{secrets.DOCKER_USERNAME}}" --password-stdin

      - name: Docker image build
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/web-app:v3 .

      - name : Image Verification 
        run: docker images

      - name : Docker Push 
        run: docker push ${{secrets.DOCKER_USERNAME}}/web-app:v3



